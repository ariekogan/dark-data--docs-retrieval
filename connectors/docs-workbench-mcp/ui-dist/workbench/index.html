<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs Workbench</title>
  <style>
    :root {
      --bg: #0b0d10;
      --surface: #14171c;
      --surface-2: #1b1f26;
      --border: #2a2f38;
      --text: #e6e9ee;
      --text-muted: #8b94a0;
      --accent: #5c9cff;
      --accent-hover: #7ab0ff;
      --success: #4ade80;
      --warning: #fbbf24;
      --error: #ef4444;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100%; }
    body { display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .subtitle { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    main { flex: 1; overflow-y: auto; padding: 24px; max-width: 960px; margin: 0 auto; width: 100%; }
    button { background: var(--accent); color: white; border: none; padding: 8px 14px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 120ms; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: var(--border); }
    button.danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
    button.danger:hover:not(:disabled) { background: var(--error); color: white; }
    input[type="text"], textarea { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px 10px; border-radius: var(--radius); font-size: 13px; width: 100%; font-family: inherit; }
    input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card h2 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
    .row { display: flex; align-items: center; gap: 12px; }
    .row.between { justify-content: space-between; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge.ok { background: rgba(74, 222, 128, 0.12); color: var(--success); }
    .badge.off { background: rgba(139, 148, 160, 0.12); color: var(--text-muted); }
    .badge.warn { background: rgba(251, 191, 36, 0.12); color: var(--warning); }
    .muted { color: var(--text-muted); font-size: 12px; }
    .spacer { height: 8px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state h3 { margin: 12px 0 8px 0; color: var(--text); font-size: 16px; }
    .corpus-list { display: flex; flex-direction: column; gap: 8px; }
    .corpus-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .corpus-row .info { flex: 1; min-width: 0; }
    .corpus-row .name { font-weight: 600; }
    .corpus-row .stats { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .corpus-row .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .log { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-muted); max-height: 140px; overflow-y: auto; margin-top: 8px; }
    .log .line { padding: 2px 0; }
    .log .line.err { color: var(--error); }
    .log .line.ok { color: var(--success); }
    .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 460px; width: 90%; }
    .modal h3 { margin: 0 0 14px 0; font-size: 16px; }
    .modal .field { margin-bottom: 14px; }
    .modal .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>📚 Docs Workbench</h1>
      <div class="subtitle">Connect a document source, build corpora, answer questions.</div>
    </div>
    <div id="dropbox-badge"></div>
  </header>
  <main id="main">
    <div class="empty-state"><div class="spinner"></div><div style="margin-top: 8px;">Loading…</div></div>
  </main>

  <script>
    // ─────────────────────────────────────────────────────────────
    // MCP host bridge (postMessage)
    // ─────────────────────────────────────────────────────────────
    const PLUGIN_ID = 'mcp:docs-workbench-mcp:workbench';
    const pending = new Map();
    let reqSeq = 0;

    function mcpCall(tool, args = {}, connectorId = null) {
      return new Promise((resolve, reject) => {
        const id = 'req_' + (++reqSeq);
        pending.set(id, { resolve, reject, at: Date.now() });
        window.parent.postMessage({
          type: 'adas-plugin',
          pluginId: PLUGIN_ID,
          action: 'mcpCall',
          requestId: id,
          payload: { tool, args, connectorId },
        }, '*');
        // Timeout
        setTimeout(() => {
          if (pending.has(id)) {
            pending.delete(id);
            reject(new Error(`mcpCall timeout: ${tool}`));
          }
        }, 60000);
      });
    }

    window.addEventListener('message', (ev) => {
      const d = ev.data;
      if (!d || d.type !== 'adas-host') return;
      const id = d.requestId;
      if (!id || !pending.has(id)) return;
      const { resolve, reject } = pending.get(id);
      pending.delete(id);
      if (d.error) reject(new Error(d.error));
      else {
        // Tool results come as { content: [{ type:'text', text:'{...}' }] }
        const r = d.result;
        if (r && Array.isArray(r.content) && r.content[0]?.text) {
          try { resolve(JSON.parse(r.content[0].text)); }
          catch { resolve(r); }
        } else {
          resolve(r);
        }
      }
    });

    // ─────────────────────────────────────────────────────────────
    // State + helpers
    // ─────────────────────────────────────────────────────────────
    const state = {
      dropbox: { connected: false, account_email: null },
      corpora: [],
      syncing: {},  // corpus_id -> log lines[]
    };
    const $ = (sel) => document.querySelector(sel);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmtTs = (t) => t ? new Date(t).toLocaleString() : '—';

    // ─────────────────────────────────────────────────────────────
    // Render
    // ─────────────────────────────────────────────────────────────
    function renderBadge() {
      const el = $('#dropbox-badge');
      if (state.dropbox.connected) {
        el.innerHTML = `<span class="badge ok">● Dropbox: ${esc(state.dropbox.account_email || 'connected')}</span>`;
      } else {
        el.innerHTML = `<span class="badge off">○ Dropbox: not connected</span>`;
      }
    }

    function renderSetup() {
      $('#main').innerHTML = `
        <div class="card">
          <h2>Connect your Dropbox</h2>
          <p class="muted">This solution pulls documents from a Dropbox folder, indexes them, and answers questions about them.
            Connect your Dropbox once for the whole organization.</p>
          <div class="spacer"></div>
          <button id="btn-connect">Connect Dropbox →</button>
          <div id="connect-log" class="log" style="display:none;"></div>
        </div>
      `;
      $('#btn-connect').addEventListener('click', connectDropbox);
    }

    function renderMain() {
      const corpora = state.corpora;
      $('#main').innerHTML = `
        <div class="card">
          <div class="row between">
            <div>
              <h2 style="margin:0;">Dropbox connection</h2>
              <div class="muted">Account: ${esc(state.dropbox.account_email || 'connected')}</div>
            </div>
            <button class="danger" id="btn-disconnect">Disconnect</button>
          </div>
        </div>
        <div class="card">
          <div class="row between" style="margin-bottom: 12px;">
            <h2 style="margin:0;">Corpora (${corpora.length})</h2>
            <button id="btn-new-corpus">+ New corpus</button>
          </div>
          ${corpora.length === 0
            ? `<div class="empty-state">
                 <div style="font-size: 32px;">📂</div>
                 <h3>No corpora yet</h3>
                 <p class="muted">Create a corpus and sync a Dropbox folder into it.</p>
               </div>`
            : `<div class="corpus-list">${corpora.map(renderCorpusRow).join('')}</div>`
          }
        </div>
      `;
      $('#btn-disconnect').addEventListener('click', disconnectDropbox);
      $('#btn-new-corpus').addEventListener('click', openNewCorpusModal);
      document.querySelectorAll('[data-sync]').forEach(b => b.addEventListener('click', () => syncCorpus(b.dataset.sync, b.dataset.path || '')));
      document.querySelectorAll('[data-delete]').forEach(b => b.addEventListener('click', () => deleteCorpus(b.dataset.delete)));
    }

    function renderCorpusRow(c) {
      const lastSync = c.last_indexed_at ? fmtTs(c.last_indexed_at) : 'never';
      const path = c.source_config?.path || '(no path set)';
      const logHtml = state.syncing[c.corpus_id]
        ? `<div class="log">${state.syncing[c.corpus_id].map(l => `<div class="line ${l.cls||''}">${esc(l.text)}</div>`).join('')}</div>`
        : '';
      return `
        <div class="corpus-row">
          <div class="info">
            <div class="name">${esc(c.name)}</div>
            <div class="stats">${c.file_count||0} files · ${c.chunk_count||0} chunks · folder: ${esc(path)} · last synced: ${lastSync}</div>
            ${logHtml}
          </div>
          <div class="actions">
            <button class="secondary" data-sync="${c.corpus_id}" data-path="${esc(path)}">Sync now</button>
            <button class="danger" data-delete="${c.corpus_id}">Delete</button>
          </div>
        </div>
      `;
    }

    function openNewCorpusModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-back';
      modal.innerHTML = `
        <div class="modal">
          <h3>New corpus</h3>
          <div class="field">
            <label>Corpus name</label>
            <input type="text" id="nc-name" placeholder="e.g. engineering-handbook" autofocus />
          </div>
          <div class="field">
            <label>Dropbox folder (path from root)</label>
            <input type="text" id="nc-path" placeholder="/Engineering" value="/" />
            <div class="muted" style="margin-top: 4px;">Must start with /. Use / for the root.</div>
          </div>
          <div class="actions">
            <button class="secondary" id="nc-cancel">Cancel</button>
            <button id="nc-create">Create &amp; sync</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      $('#nc-cancel').addEventListener('click', () => modal.remove());
      $('#nc-create').addEventListener('click', async () => {
        const name = $('#nc-name').value.trim();
        const path = $('#nc-path').value.trim();
        if (!name) return alert('Name is required');
        if (!path.startsWith('/')) return alert('Path must start with /');
        $('#nc-create').disabled = true;
        $('#nc-create').innerHTML = '<span class="spinner"></span> Creating…';
        try {
          const res = await mcpCall('docs.corpus.create', {
            name,
            source_type: 'dropbox',
            source_config: { path, recursive: true },
          }, 'docs-index-mcp');
          if (!res.ok) throw new Error(res.error || 'create failed');
          modal.remove();
          await loadCorpora();
          renderMain();
          // Auto-sync
          syncCorpus(res.corpus_id, path);
        } catch (e) {
          alert('Create failed: ' + e.message);
          $('#nc-create').disabled = false;
          $('#nc-create').textContent = 'Create & sync';
        }
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Actions
    // ─────────────────────────────────────────────────────────────
    async function connectDropbox() {
      const btn = $('#btn-connect');
      const log = $('#connect-log');
      log.style.display = 'block';
      log.innerHTML = '<div class="line">Requesting OAuth URL…</div>';
      btn.disabled = true;
      try {
        const res = await mcpCall('dropbox.setup', {}, 'dropbox-mcp');
        if (!res.ok) throw new Error(res.error || 'setup failed');
        log.innerHTML += '<div class="line ok">✓ OAuth URL received. Opening…</div>';
        window.open(res.auth_url, '_blank', 'noopener,noreferrer,width=600,height=720');
        log.innerHTML += '<div class="line">Waiting for Dropbox callback…</div>';
        await pollForConnection(log);
      } catch (e) {
        log.innerHTML += `<div class="line err">✗ ${esc(e.message)}</div>`;
        btn.disabled = false;
      }
    }

    async function pollForConnection(logEl, maxSeconds = 120) {
      const started = Date.now();
      while (Date.now() - started < maxSeconds * 1000) {
        await new Promise(r => setTimeout(r, 2500));
        try {
          const s = await mcpCall('dropbox.status', {}, 'dropbox-mcp');
          if (s.connected) {
            logEl.innerHTML += `<div class="line ok">✓ Connected as ${esc(s.account_email || 'Dropbox user')}</div>`;
            state.dropbox = s;
            await loadCorpora();
            renderBadge();
            renderMain();
            return;
          }
        } catch {}
      }
      logEl.innerHTML += '<div class="line err">✗ Timed out. If you completed the browser flow, click "Refresh" to check again.</div>';
      const btn = document.createElement('button');
      btn.className = 'secondary';
      btn.style.marginTop = '8px';
      btn.textContent = 'Refresh';
      btn.addEventListener('click', init);
      logEl.appendChild(btn);
    }

    async function disconnectDropbox() {
      if (!confirm('Disconnect Dropbox? All users in the organization will lose access until reconnected.')) return;
      try {
        await mcpCall('dropbox.disconnect', {}, 'dropbox-mcp');
        state.dropbox = { connected: false, account_email: null };
        renderBadge();
        renderSetup();
      } catch (e) {
        alert('Disconnect failed: ' + e.message);
      }
    }

    async function syncCorpus(corpus_id, path) {
      const c = state.corpora.find(x => x.corpus_id === corpus_id);
      if (!c) return;
      state.syncing[corpus_id] = [{ text: 'Sync started…', cls: '' }];
      renderMain();
      try {
        const res = await mcpCall('dropbox.index_folder', {
          corpus_id,
          path: path || c.source_config?.path || '/',
          recursive: true,
          use_cursor: true,
        }, 'dropbox-mcp');
        if (!res.ok) throw new Error(res.error || 'sync failed');
        const log = state.syncing[corpus_id];
        log.push({ text: `Walked ${res.walked} entries`, cls: '' });
        log.push({ text: `Indexed: ${res.indexed} · Skipped: ${res.skipped} · Failed: ${res.failed}`, cls: res.failed > 0 ? 'warn' : 'ok' });
        if (res.errors?.length) log.push({ text: `First error: ${res.errors[0].path}: ${res.errors[0].error}`, cls: 'err' });
        await loadCorpora();
        renderMain();
      } catch (e) {
        state.syncing[corpus_id].push({ text: '✗ ' + e.message, cls: 'err' });
        renderMain();
      }
    }

    async function deleteCorpus(corpus_id) {
      const c = state.corpora.find(x => x.corpus_id === corpus_id);
      if (!c) return;
      if (!confirm(`Delete corpus "${c.name}"? This removes all files and chunks (not the Dropbox originals).`)) return;
      try {
        await mcpCall('docs.corpus.delete', { corpus_id }, 'docs-index-mcp');
        await loadCorpora();
        renderMain();
      } catch (e) {
        alert('Delete failed: ' + e.message);
      }
    }

    async function loadCorpora() {
      try {
        const res = await mcpCall('docs.corpus.list', {}, 'docs-index-mcp');
        state.corpora = (res.corpora || []).map(c => ({ ...c, corpus_id: c.corpus_id || c._id }));
      } catch (e) {
        state.corpora = [];
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────────────
    async function init() {
      try {
        const s = await mcpCall('dropbox.status', {}, 'dropbox-mcp');
        state.dropbox = s;
        renderBadge();
        if (s.connected) {
          await loadCorpora();
          renderMain();
        } else {
          renderSetup();
        }
      } catch (e) {
        $('#main').innerHTML = `
          <div class="card">
            <h2>Couldn't reach the backend</h2>
            <p class="muted">${esc(e.message)}</p>
            <button class="secondary" onclick="init()">Retry</button>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
