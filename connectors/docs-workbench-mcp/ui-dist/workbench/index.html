<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs Workbench</title>
  <style>
    :root {
      --bg: #0b0d10; --surface: #14171c; --surface-2: #1b1f26; --border: #2a2f38;
      --text: #e6e9ee; --text-muted: #8b94a0; --accent: #5c9cff; --accent-hover: #7ab0ff;
      --success: #4ade80; --warning: #fbbf24; --error: #ef4444; --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100%; }
    body { display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .subtitle { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    main { flex: 1; overflow-y: auto; padding: 24px; max-width: 960px; margin: 0 auto; width: 100%; }
    button { background: var(--accent); color: white; border: none; padding: 8px 14px;
      border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 120ms; }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover:not(:disabled) { background: var(--border); }
    button.danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
    button.danger:hover:not(:disabled) { background: var(--error); color: white; }
    input[type="text"], input[type="password"], textarea {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      padding: 8px 10px; border-radius: var(--radius); font-size: 13px; width: 100%; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; }
    .card h2 { margin: 0 0 12px 0; font-size: 16px; font-weight: 600; }
    .row { display: flex; align-items: center; gap: 12px; }
    .row.between { justify-content: space-between; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
      border-radius: 12px; font-size: 12px; font-weight: 500; }
    .badge.ok { background: rgba(74, 222, 128, 0.12); color: var(--success); }
    .badge.off { background: rgba(139, 148, 160, 0.12); color: var(--text-muted); }
    .badge.warn { background: rgba(251, 191, 36, 0.12); color: var(--warning); }
    .live-badge { display: none; margin-left: 8px; font-size: 10px; color: var(--success); }
    .muted { color: var(--text-muted); font-size: 12px; }
    .spacer { height: 8px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .field .hint { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
    .mono { font-family: "SF Mono", Menlo, monospace; font-size: 12px; }
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
    .empty-state h3 { margin: 12px 0 8px 0; color: var(--text); font-size: 16px; }
    .corpus-list { display: flex; flex-direction: column; gap: 8px; }
    .corpus-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .corpus-row .info { flex: 1; min-width: 0; }
    .corpus-row .name { font-weight: 600; }
    .corpus-row .stats { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .corpus-row .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .log { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 8px 12px; font-family: "SF Mono", Menlo, monospace; font-size: 12px;
      color: var(--text-muted); max-height: 140px; overflow-y: auto; margin-top: 8px; }
    .log .line { padding: 2px 0; }
    .log .line.err { color: var(--error); }
    .log .line.ok { color: var(--success); }
    .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px; max-width: 460px; width: 90%; }
    .modal h3 { margin: 0 0 14px 0; font-size: 16px; }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--text-muted);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .copy-row { display: flex; align-items: center; gap: 6px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; }
    .copy-row code { flex: 1; font-size: 11px; word-break: break-all; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>📚 Docs Workbench</h1>
      <div class="subtitle">Connect a document source, build corpora, answer questions.</div>
    </div>
    <div id="dropbox-badge">
      <span class="badge off">○ Dropbox: checking…</span>
      <span class="live-badge" id="liveBadge">● LIVE</span>
    </div>
  </header>
  <main id="main">
    <div class="card"><h2>Welcome to Docs Workbench</h2><p class="muted">Loading…</p></div>
  </main>

  <script>
    const DEFAULT_REDIRECT = "https://api.ateam-ai.com/api/integrations/dropbox/callback";
    const state = {
      app: { configured: false, app_key_preview: null, redirect_uri: DEFAULT_REDIRECT, source: "none" },
      dropbox: { connected: false, account_email: null },
      corpora: [],
      syncing: {},
      hostReady: false,
    };

    const $ = (sel) => document.querySelector(sel);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmtTs = (t) => t ? new Date(t).toLocaleString() : '—';

    // ── postMessage bridge per spec _cross_connector_data_access ──
    let counter = 0;
    const pending = new Map();

    window.addEventListener("message", (ev) => {
      const d = ev.data || {};
      if (d.source !== "adas-host") return;
      const msg = d.message;
      if (!msg) return;
      if (msg.type === "init") { state.hostReady = true; refreshLive(); return; }
      if (msg.type === "mcp-result") {
        const { requestId, result, error } = msg.payload || {};
        const p = pending.get(requestId);
        if (!p) return;
        pending.delete(requestId);
        if (error) p.reject(new Error(error));
        else p.resolve(unwrap(result));
      }
    });

    function unwrap(raw) {
      if (raw?.content?.[0]?.type === "text") { try { raw = JSON.parse(raw.content[0].text); } catch {} }
      if (raw?.content?.[0]?.type === "text") { try { raw = JSON.parse(raw.content[0].text); } catch {} }
      return raw;
    }

    function mcpCall(tool, args, connectorId) {
      const requestId = "req_" + (++counter) + "_" + Date.now();
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => { pending.delete(requestId); reject(new Error("timeout")); }, 20000);
        pending.set(requestId, {
          resolve: (r) => { clearTimeout(timeout); resolve(r); },
          reject:  (e) => { clearTimeout(timeout); reject(e); },
        });
        // Core has two mcpProxy impls: one reads `args`, the other reads
        // `arguments`. Send both keys so the call works regardless of which
        // one is active. (Observed: solution connectors got args stripped
        // when only `args` was sent — set_config worked by coincidence of
        // empty-args handling, but anything with real args failed.)
        window.parent.postMessage({
          source: "adas-plugin",
          message: {
            action: "mcp-call",
            payload: { requestId, toolName: "cp.fe_api", args: { method: "mcpProxy", params: { connectorId, tool, args, arguments: args } } },
          },
        }, "*");
      });
    }

    // ── Render ──
    function renderBadge() {
      const el = $('#dropbox-badge');
      const live = state.hostReady ? '<span class="live-badge" style="display:inline">● LIVE</span>' : '';
      if (state.dropbox.connected) {
        el.innerHTML = `<span class="badge ok">● Dropbox: ${esc(state.dropbox.account_email || 'connected')}</span>${live}`;
      } else if (state.app.configured) {
        el.innerHTML = `<span class="badge warn">◐ App configured, not connected</span>${live}`;
      } else {
        el.innerHTML = `<span class="badge off">○ Setup needed</span>${live}`;
      }
    }

    function renderAppConfigCard() {
      // First screen: set the Dropbox app credentials
      return `
        <div class="card">
          <h2>Step 1 — Configure your Dropbox app</h2>
          <p class="muted">
            Before users can connect, paste your Dropbox app credentials. Create an app at
            <a href="https://www.dropbox.com/developers/apps" target="_blank" style="color: var(--accent);">dropbox.com/developers/apps</a>
            with scopes:
            <span class="mono">account_info.read</span>,
            <span class="mono">files.metadata.read</span>,
            <span class="mono">files.content.read</span>,
            <span class="mono">files.content.write</span>.
          </p>
          <div class="spacer"></div>
          <div class="field">
            <label>Dropbox redirect URI <span class="muted">(copy this into your app's Settings → OAuth 2 → Redirect URIs)</span></label>
            <div class="copy-row">
              <code id="redirect-code">${esc(state.app.redirect_uri)}</code>
              <button class="secondary" id="copy-redirect">Copy</button>
            </div>
          </div>
          <div class="field">
            <label>App key</label>
            <input type="text" id="app-key" placeholder="e.g. abc123def456..." />
          </div>
          <div class="field">
            <label>App secret</label>
            <input type="password" id="app-secret" placeholder="(hidden)" />
            <div class="hint">Stored locally in the connector's SQLite (tenant-scoped, never leaves this connector).</div>
          </div>
          <div class="row between">
            <button class="secondary" id="btn-skip-config" style="display: ${state.app.source === 'env' ? 'inline-block' : 'none'};">Skip — use env fallback</button>
            <button id="btn-save-config">Save credentials →</button>
          </div>
          <div id="save-log" class="log" style="display:none;"></div>
        </div>
      `;
    }

    function renderConnectedAppCard() {
      // Shows when app is configured — summary + option to change
      return `
        <div class="card">
          <div class="row between">
            <div>
              <h2 style="margin:0;">Dropbox app</h2>
              <div class="muted">Key: <span class="mono">${esc(state.app.app_key_preview || '(hidden)')}</span>
                · Source: ${esc(state.app.source)}
                · Redirect: <span class="mono">${esc(state.app.redirect_uri)}</span>
              </div>
            </div>
            <button class="secondary" id="btn-change-app">Change</button>
          </div>
        </div>
      `;
    }

    function renderConnectCard() {
      return `
        <div class="card">
          <h2>Step 2 — Connect Dropbox</h2>
          <p class="muted">The Auth WebView panel will open — sign into Dropbox there and approve.
            Tokens come back to this workbench automatically.</p>
          <div class="spacer"></div>
          <button id="btn-connect">Connect Dropbox →</button>
          <div id="connect-log" class="log" style="display:none;"></div>
        </div>
      `;
    }

    function renderConnectedCard() {
      return `
        <div class="card">
          <div class="row between">
            <div>
              <h2 style="margin:0;">Dropbox connection</h2>
              <div class="muted">Account: ${esc(state.dropbox.account_email || 'connected')}</div>
            </div>
            <button class="danger" id="btn-disconnect">Disconnect</button>
          </div>
        </div>
      `;
    }

    function renderCorporaCard() {
      const corpora = state.corpora;
      return `
        <div class="card">
          <div class="row between" style="margin-bottom: 12px;">
            <h2 style="margin:0;">Corpora (${corpora.length})</h2>
            <button id="btn-new-corpus">+ New corpus</button>
          </div>
          ${corpora.length === 0
            ? `<div class="empty-state">
                 <div style="font-size: 32px;">📂</div>
                 <h3>No corpora yet</h3>
                 <p class="muted">Create a corpus and sync a Dropbox folder into it.</p>
               </div>`
            : `<div class="corpus-list">${corpora.map(renderCorpusRow).join('')}</div>`
          }
        </div>
      `;
    }

    function renderCorpusRow(c) {
      const lastSync = c.last_indexed_at ? fmtTs(c.last_indexed_at) : 'never';
      const path = c.source_config?.path || '(no path set)';
      const logHtml = state.syncing[c.corpus_id]
        ? `<div class="log">${state.syncing[c.corpus_id].map(l =>
            `<div class="line ${l.cls||''}">${esc(l.text)}</div>`).join('')}</div>`
        : '';
      return `
        <div class="corpus-row">
          <div class="info">
            <div class="name">${esc(c.name)}</div>
            <div class="stats">${c.file_count||0} files · ${c.chunk_count||0} chunks · folder: ${esc(path)} · last synced: ${lastSync}</div>
            ${logHtml}
          </div>
          <div class="actions">
            <button class="secondary" data-sync="${c.corpus_id}" data-path="${esc(path)}">Sync now</button>
            <button class="danger" data-delete="${c.corpus_id}">Delete</button>
          </div>
        </div>
      `;
    }

    function renderMain() {
      // App not configured → show only the config card
      if (!state.app.configured) {
        $('#main').innerHTML = renderAppConfigCard();
        bindAppConfigHandlers();
        return;
      }
      // App configured but Dropbox not connected → show app summary + connect card
      if (!state.dropbox.connected) {
        $('#main').innerHTML = renderConnectedAppCard() + renderConnectCard();
        bindAppConfigHandlers();
        $('#btn-connect').addEventListener('click', connectDropbox);
        return;
      }
      // Fully connected → show everything
      $('#main').innerHTML = renderConnectedAppCard() + renderConnectedCard() + renderCorporaCard();
      bindAppConfigHandlers();
      $('#btn-disconnect').addEventListener('click', disconnectDropbox);
      $('#btn-new-corpus').addEventListener('click', openNewCorpusModal);
      document.querySelectorAll('[data-sync]').forEach(b =>
        b.addEventListener('click', () => syncCorpus(b.dataset.sync, b.dataset.path || '')));
      document.querySelectorAll('[data-delete]').forEach(b =>
        b.addEventListener('click', () => deleteCorpus(b.dataset.delete)));
    }

    function bindAppConfigHandlers() {
      const copyBtn = $('#copy-redirect');
      if (copyBtn) copyBtn.addEventListener('click', () => {
        const code = $('#redirect-code')?.textContent || '';
        if (navigator.clipboard) navigator.clipboard.writeText(code);
        copyBtn.textContent = 'Copied ✓';
        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
      });
      const saveBtn = $('#btn-save-config');
      if (saveBtn) saveBtn.addEventListener('click', saveAppConfig);
      const changeBtn = $('#btn-change-app');
      if (changeBtn) changeBtn.addEventListener('click', () => {
        state.app = { ...state.app, configured: false };
        renderMain();
      });
      const skipBtn = $('#btn-skip-config');
      if (skipBtn) skipBtn.addEventListener('click', () => {
        // User wants to use env fallback — mark configured locally (server treats env as source-of-truth).
        state.app = { ...state.app, configured: true, source: 'env' };
        renderMain();
      });
    }

    // ── Actions ──
    async function saveAppConfig() {
      const app_key = $('#app-key').value.trim();
      const app_secret = $('#app-secret').value.trim();
      const log = $('#save-log');
      log.style.display = 'block';
      if (!app_key || !app_secret) { log.innerHTML = '<div class="line err">✗ Both fields are required.</div>'; return; }
      log.innerHTML = '<div class="line">Saving…</div>';
      $('#btn-save-config').disabled = true;
      try {
        const res = await mcpCall('dropbox.app.set_config', {
          app_key, app_secret, redirect_uri: state.app.redirect_uri,
        }, 'dropbox-mcp');
        if (res?.ok === false) throw new Error(res.error || 'save failed');
        log.innerHTML += '<div class="line ok">✓ Saved. Ready to connect.</div>';
        state.app = { configured: true, app_key_preview: res.app_key_preview, redirect_uri: res.redirect_uri, source: 'sqlite' };
        setTimeout(() => renderMain(), 600);
      } catch (e) {
        log.innerHTML += `<div class="line err">✗ ${esc(e.message)}</div>`;
        $('#btn-save-config').disabled = false;
      }
    }

    async function connectDropbox() {
      const btn = $('#btn-connect');
      const log = $('#connect-log');
      log.style.display = 'block';
      log.innerHTML = '<div class="line">Requesting OAuth URL…</div>';
      btn.disabled = true;
      try {
        // 1) Get the auth URL from dropbox-mcp (builds nonce + PKCE challenge
        //    and stashes verifier keyed by state).
        const setup = await mcpCall('dropbox.setup', {}, 'dropbox-mcp');
        console.log('[workbench][dropbox.setup-response]', setup);
        if (!setup || setup.ok === false || !setup.auth_url) {
          throw new Error('dropbox.setup failed: ' + JSON.stringify(setup).slice(0, 200));
        }

        // 2) Render a big link the user clicks directly — this is a direct
        //    user gesture on an anchor with target=_blank, which Chrome allows
        //    even inside sandboxed iframes (provided allow-popups-to-escape-
        //    sandbox is set on the frame). No programmatic window.open().
        // Try to copy the OAuth URL to clipboard immediately so the user only
        // needs to open a new tab and paste. Fall back to a manual textarea
        // if the clipboard API is blocked.
        let autoCopied = false;
        try {
          await navigator.clipboard.writeText(setup.auth_url);
          autoCopied = true;
        } catch {}

        log.innerHTML = ''; // clear "Requesting…"
        log.innerHTML += `
          <div class="line ok">${autoCopied ? '✓ Auth URL copied to your clipboard.' : '✓ Auth URL ready.'}</div>
          <div class="line" style="margin-top: 10px; padding: 12px; background: var(--surface-2); border: 1px solid var(--accent); border-radius: var(--radius);">
            <div style="font-weight: 600; color: var(--text); margin-bottom: 6px;">Next steps:</div>
            <ol style="margin: 0; padding-left: 20px; line-height: 1.8;">
              <li>Open a new browser tab (Cmd/Ctrl+T)</li>
              <li>${autoCopied ? 'Paste (Cmd/Ctrl+V) and press Enter' : 'Copy the URL below, paste into the new tab, press Enter'}</li>
              <li>Sign into Dropbox and approve</li>
              <li>Dropbox will redirect to <span class="mono" style="font-size:11px;">api.ateam-ai.com/…/dropbox/callback?code=…</span></li>
              <li>Copy that final URL from the new tab's address bar</li>
              <li>Come back here and paste it into the <strong>Submit</strong> box below</li>
            </ol>
          </div>
          <div class="line" style="margin-top: 8px; display: flex; gap: 8px; align-items: center;">
            <button class="secondary" id="copy-oauth-url">${autoCopied ? 'Copy again' : 'Copy URL to clipboard'}</button>
            <textarea id="oauth-url-display" readonly rows="2"
              style="flex: 1; font-family: monospace; font-size: 11px; resize: none; background: var(--surface-2);"
            >${esc(setup.auth_url)}</textarea>
          </div>
        `;
        const copyBtn = document.getElementById('copy-oauth-url');
        if (copyBtn) {
          copyBtn.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(setup.auth_url); }
            catch {
              const ta = document.getElementById('oauth-url-display');
              ta.select();
              document.execCommand('copy');
            }
            copyBtn.textContent = 'Copied ✓';
            setTimeout(() => { copyBtn.textContent = 'Copy again'; }, 2000);
          });
        }
        log.innerHTML += '<div class="line muted" style="margin-top: 8px;">Watching for connection…</div>';
        renderPasteFallback(log, setup.auth_url);

        // 3) Poll dropbox.status — Core's /api/integrations/dropbox/callback
        //    endpoint calls dropbox._storeTokens automatically when Dropbox
        //    redirects to it, flipping dropbox.status to connected.
        pollForConnection(log, 300);
      } catch (e) {
        log.innerHTML += `<div class="line err">✗ ${esc(e.message)}</div>`;
        btn.disabled = false;
      }
    }

    // Paste-URL fallback: user copies the redirect URL out of the popup's
    // address bar (after Dropbox approval) and pastes it here. We extract
    // code + state and call dropbox._storeTokens directly.
    function renderPasteFallback(logEl, authUrl) {
      if (document.getElementById('paste-fallback')) return; // already rendered
      const holder = document.createElement('div');
      holder.id = 'paste-fallback';
      holder.style.cssText = 'margin-top: 10px; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);';
      holder.innerHTML = `
        <div class="muted" style="margin-bottom: 6px;">
          If the popup didn't redirect back automatically, paste the URL from the popup's address bar (starts with <span class="mono">https://api.ateam-ai.com/api/integrations/dropbox/callback</span>):
        </div>
        <div style="display: flex; gap: 6px;">
          <input type="text" id="paste-url" placeholder="https://api.ateam-ai.com/api/integrations/dropbox/callback?code=…&state=…" style="flex:1;" />
          <button id="paste-submit" class="secondary">Submit</button>
        </div>
      `;
      logEl.parentElement.insertBefore(holder, logEl.nextSibling);
      document.getElementById('paste-submit').addEventListener('click', async () => {
        const raw = document.getElementById('paste-url').value.trim();
        if (!raw) return;
        try {
          const u = new URL(raw);
          const code = u.searchParams.get('code');
          const state = u.searchParams.get('state');
          if (!code || !state) throw new Error('URL missing code or state');
          logEl.innerHTML += '<div class="line">Submitting code…</div>';
          const r = await mcpCall('dropbox._storeTokens', { code, state }, 'dropbox-mcp');
          if (r?.ok === false) throw new Error(r.error || 'token exchange failed');
          logEl.innerHTML += `<div class="line ok">✓ Connected as ${esc(r.account_email || 'Dropbox user')}</div>`;
          holder.remove();
          await refreshLive();
        } catch (e) {
          logEl.innerHTML += `<div class="line err">✗ ${esc(e.message)}</div>`;
        }
      });
    }

    async function pollForConnection(logEl, maxSeconds = 120) {
      // Passive poll — only used if a server-side callback path exists.
      // Primary flow is the paste-URL input.
      const started = Date.now();
      while (Date.now() - started < maxSeconds * 1000) {
        await new Promise(r => setTimeout(r, 3000));
        try {
          const s = await mcpCall('dropbox.status', {}, 'dropbox-mcp');
          if (s.connected) {
            logEl.innerHTML += `<div class="line ok">✓ Connected as ${esc(s.account_email || 'Dropbox user')}</div>`;
            state.dropbox = s;
            await loadCorpora();
            renderBadge();
            renderMain();
            return;
          }
        } catch {}
      }
    }

    async function disconnectDropbox() {
      if (!confirm('Disconnect Dropbox? All users in the organization will lose access until reconnected.')) return;
      try {
        await mcpCall('dropbox.disconnect', {}, 'dropbox-mcp');
        state.dropbox = { connected: false, account_email: null };
        state.corpora = [];
        renderBadge();
        renderMain();
      } catch (e) { alert('Disconnect failed: ' + e.message); }
    }

    function openNewCorpusModal() {
      const modal = document.createElement('div');
      modal.className = 'modal-back';
      modal.innerHTML = `
        <div class="modal">
          <h3>New corpus</h3>
          <div class="field"><label>Corpus name</label>
            <input type="text" id="nc-name" placeholder="e.g. engineering-handbook" autofocus /></div>
          <div class="field"><label>Dropbox folder (path from root)</label>
            <input type="text" id="nc-path" placeholder="/Engineering" value="/" />
            <div class="hint">Must start with /. Use / for the root.</div></div>
          <div class="actions">
            <button class="secondary" id="nc-cancel">Cancel</button>
            <button id="nc-create">Create &amp; sync</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      $('#nc-cancel').addEventListener('click', () => modal.remove());
      $('#nc-create').addEventListener('click', async () => {
        const name = $('#nc-name').value.trim();
        const path = $('#nc-path').value.trim();
        if (!name) return alert('Name is required');
        if (!path.startsWith('/')) return alert('Path must start with /');
        $('#nc-create').disabled = true;
        $('#nc-create').innerHTML = '<span class="spinner"></span> Creating…';
        try {
          const res = await mcpCall('docs.corpus.create', {
            name, source_type: 'dropbox', source_config: { path, recursive: true },
          }, 'docs-index-mcp');
          if (res?.ok === false) throw new Error(res.error || 'create failed');
          modal.remove();
          await loadCorpora();
          renderMain();
          syncCorpus(res.corpus_id || res._id, path);
        } catch (e) {
          alert('Create failed: ' + e.message);
          $('#nc-create').disabled = false;
          $('#nc-create').textContent = 'Create & sync';
        }
      });
    }

    async function syncCorpus(corpus_id, path) {
      if (!corpus_id) return;
      state.syncing[corpus_id] = [{ text: 'Sync started…', cls: '' }];
      renderMain();
      try {
        const res = await mcpCall('dropbox.index_folder', {
          corpus_id, path: path || '/', recursive: true, use_cursor: true,
        }, 'dropbox-mcp');
        if (res?.ok === false) throw new Error(res.error || 'sync failed');
        const log = state.syncing[corpus_id];
        log.push({ text: `Walked ${res.walked || 0} entries`, cls: '' });
        log.push({ text: `Indexed: ${res.indexed || 0} · Skipped: ${res.skipped || 0} · Failed: ${res.failed || 0}`,
          cls: (res.failed || 0) > 0 ? 'warn' : 'ok' });
        if (res.errors?.length) log.push({ text: `First error: ${res.errors[0].path}: ${res.errors[0].error}`, cls: 'err' });
        await loadCorpora();
        renderMain();
      } catch (e) {
        state.syncing[corpus_id].push({ text: '✗ ' + e.message, cls: 'err' });
        renderMain();
      }
    }

    async function deleteCorpus(corpus_id) {
      const c = state.corpora.find(x => x.corpus_id === corpus_id);
      if (!c) return;
      if (!confirm(`Delete corpus "${c.name}"?`)) return;
      try {
        await mcpCall('docs.corpus.delete', { corpus_id }, 'docs-index-mcp');
        await loadCorpora();
        renderMain();
      } catch (e) { alert('Delete failed: ' + e.message); }
    }

    async function loadCorpora() {
      try {
        const res = await mcpCall('docs.corpus.list', {}, 'docs-index-mcp');
        state.corpora = (res.corpora || []).map(c => ({ ...c, corpus_id: c.corpus_id || c._id }));
      } catch { /* silent */ }
    }

    async function refreshLive() {
      try {
        const app = await mcpCall('dropbox.app.get_config', {}, 'dropbox-mcp');
        if (app && typeof app.configured === 'boolean') {
          state.app = {
            configured: app.configured,
            app_key_preview: app.app_key_preview || null,
            redirect_uri: app.redirect_uri || DEFAULT_REDIRECT,
            source: app.source || 'none',
          };
        }
      } catch { /* silent */ }

      if (state.app.configured) {
        try {
          const s = await mcpCall('dropbox.status', {}, 'dropbox-mcp');
          if (s && typeof s.connected === 'boolean') state.dropbox = s;
          if (state.dropbox.connected) await loadCorpora();
        } catch { /* silent */ }
      }

      renderBadge();
      renderMain();
    }

    // Initial render with DEFAULTS — mobile sees this; desktop upgrades via refreshLive()
    renderBadge();
    renderMain();
  </script>
</body>
</html>
