<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dropbox — signed in</title>
  <style>
    body { background: #0b0d10; color: #e6e9ee; font: 14px/1.5 -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px; text-align: center; }
    .card { background: #14171c; border: 1px solid #2a2f38; border-radius: 8px;
      padding: 32px 40px; max-width: 420px; }
    h1 { margin: 0 0 12px 0; font-size: 18px; }
    p { color: #8b94a0; margin: 4px 0; }
    .ok { color: #4ade80; }
    .err { color: #ef4444; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #8b94a0;
      border-top-color: #5c9cff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title"><span class="spinner"></span>Completing sign-in…</h1>
    <p id="msg">Sending tokens back to the workbench…</p>
  </div>
  <script>
    // Same-origin with the workbench iframe → postMessage reaches it via window.opener.
    // This page is the registered Dropbox redirect URI.
    const params = new URLSearchParams(window.location.search);
    const code  = params.get("code");
    const state = params.get("state");
    const error = params.get("error") || params.get("error_description");
    const titleEl = document.getElementById("title");
    const msgEl = document.getElementById("msg");

    function fail(text) {
      titleEl.innerHTML = '<span class="err">✗ Sign-in failed</span>';
      msgEl.textContent = text;
    }

    if (error) {
      fail("Dropbox returned: " + error);
    } else if (!code || !state) {
      fail("Missing code or state in redirect URL.");
    } else if (!window.opener) {
      fail("This page was opened directly — open the Docs Workbench and click Connect Dropbox first.");
    } else {
      // Post back to the workbench that opened us.
      try {
        window.opener.postMessage({
          source: "dropbox-oauth-return",
          code, state,
        }, window.location.origin);
        titleEl.innerHTML = '<span class="ok">✓ Signed in</span>';
        msgEl.textContent = "You can close this window.";
        setTimeout(() => { try { window.close(); } catch {} }, 1200);
      } catch (e) {
        fail("postMessage failed: " + e.message);
      }
    }
  </script>
</body>
</html>
